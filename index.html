<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampHamp — Campus Memory Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Staatliches&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="app-header">
  <div class="header-brand">
    <img src="assets/hamplogowhite.png" alt="Hampshire College">
    <div class="divider"></div>
    <h1>Camp<span>Hamp</span></h1>
  </div>
  <div class="header-controls">
    <button class="header-btn active" id="btn-official" onclick="toggleLayer('official')">
      <span class="label">Official </span>🏛
    </button>
    <button class="header-btn active" id="btn-memories" onclick="toggleLayer('memories')">
      <span class="label">Memories </span>💭
    </button>
    <button class="header-btn" id="btn-add" onclick="startAddMode('memory')">
      + Memory
    </button>
    <button class="header-btn admin-btn" id="btn-admin" onclick="startAddMode('official')">
      ⚙ Admin
    </button>
    <button class="header-btn" id="btn-tiles" onclick="cycleTileLayer()">
      🗺
    </button>
    <button class="header-btn" id="btn-recenter" onclick="recenterMap()" title="Re-center on Hampshire">
      ⌂
    </button>
  </div>
</header>

<div id="config-banner">
  ⚠️ Connect to Supabase: edit <code>config.js</code> with your credentials
  (see <code>config.example.js</code>). Running in <strong>demo mode</strong> with local data.
</div>

<div id="map"></div>

<div id="sidebar">
  <div class="sidebar-header">
    <h2 id="sidebar-title">Title</h2>
    <button class="close-btn" onclick="closeSidebar()">&times;</button>
  </div>
  <div class="sidebar-body" id="sidebar-body"></div>
</div>

<div id="legend">
  <h3>Map Legend</h3>
  <div class="legend-item"><div class="legend-dot" style="background:var(--teal)"></div> Buildings</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div> Cultural Sites</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8b4d9e"></div> Art & Galleries</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Nature & Farm</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div> Memorials</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--teal);opacity:0.6"></div> User Memories</div>
</div>

<div id="click-prompt"></div>
<div id="toast"></div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
