<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Non Satis Loca Scire — Hampshire College Memory Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.0.22/leaflet-maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Staatliches&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header id="app-header">
  <div class="header-brand">
    <h1>Non Satis <span>Loca Scire</span></h1>
  </div>
  <div class="header-controls">
    <button class="header-btn active" id="btn-layer-landmarks" onclick="toggleLayer('landmarks')">
      <span class="label">Landmarks </span>🕊
    </button>
    <button class="header-btn active" id="btn-layer-wayfinding" onclick="toggleLayer('wayfinding')">
      <span class="label">Wayfinding </span>🏛
    </button>
    <button class="header-btn active" id="btn-layer-memories" onclick="toggleLayer('memories')">
      <span class="label">Memories </span>💭
    </button>
    <button class="header-btn" id="btn-add" onclick="startAddMode('memory')">
      + Memory
    </button>
    <button class="header-btn admin-btn" id="btn-add-place" onclick="startAddMode('place')" hidden>
      + Place
    </button>
    <button class="header-btn admin-btn" id="btn-add-rapid" onclick="startAddMode('rapid')" hidden title="Stamp many places at once">
      ⚡ Many
    </button>
    <a class="header-btn admin-btn" id="btn-admin-portal" href="admin.html" hidden>⚙ Admin</a>
    <button class="header-btn" id="btn-tiles" onclick="cycleTileLayer()">
      🗺
    </button>
    <button class="header-btn" id="btn-recenter" onclick="recenterMap()" title="Re-center on Hampshire">
      ⌂
    </button>
    <div class="divider"></div>
    <div class="header-account">
      <button class="header-btn account-icon" id="btn-account"
              onclick="onAccountIconClick()" aria-label="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
             stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
      <div class="account-menu" id="account-menu" hidden>
        <div class="account-menu-name" id="account-menu-name"></div>
        <button type="button" class="account-menu-item" id="account-menu-signout"
                onclick="onSignOutClick()">Sign out</button>
      </div>
    </div>
  </div>
</header>

<div id="config-banner">
  ⚠️ Connect to Supabase: edit <code>config.js</code> with your credentials
  (see <code>config.example.js</code>). Running in <strong>demo mode</strong> with local data.
</div>

<div id="map"></div>

<div id="sidebar">
  <div class="sidebar-header">
    <h2 id="sidebar-title">Title</h2>
    <button class="close-btn" onclick="closeSidebar()">&times;</button>
  </div>
  <div class="sidebar-body" id="sidebar-body"></div>
</div>

<div id="zoom-indicator" title="Current map zoom level — useful when setting zoom visibility on places">
  <span class="zoom-label">Zoom</span>
  <span class="zoom-value" id="zoom-value">16</span>
</div>

<div id="legend" class="collapsed-mobile">
  <button class="legend-toggle" onclick="toggleLegend()" aria-label="Toggle legend">
    <span class="legend-toggle-text">Legend</span>
    <span class="legend-chevron">▾</span>
  </button>
  <div class="legend-body" id="legend-body">
    <!-- Populated by app.js buildLegend() so icons stay in sync. -->
  </div>
</div>

<div id="click-prompt"></div>
<div id="toast"></div>

<div id="lightbox" hidden>
  <div class="lightbox-stage">
    <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">×</button>
    <button class="lightbox-prev" onclick="lightboxStep(-1)" aria-label="Previous">‹</button>
    <img id="lightbox-img" alt="">
    <button class="lightbox-next" onclick="lightboxStep(1)" aria-label="Next">›</button>
  </div>
  <div class="lightbox-info">
    <div class="lightbox-caption" id="lightbox-caption"></div>
    <div class="lightbox-counter" id="lightbox-counter"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="icons.js"></script>
<script src="app.js"></script>
</body>
</html>
